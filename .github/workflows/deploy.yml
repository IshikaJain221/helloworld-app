name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$KEY" > deploy_key.pem
          chmod 600 deploy_key.pem
          ssh -i deploy_key.pem \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            $USER@$HOST \
            "cd ~/helloworld-app && git pull origin main && npm install --production && pm2 reload helloworld"
          rm -f deploy_key.pem